<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading...</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --bg: #ffffff;
      --bg2: #f5f6f8;
      --text: #1a1a2e;
      --text2: #555;
      --border: #dde0e6;
      --accent: #2563eb;
      --code-bg: #f3f4f6;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      --mono: "Cascadia Code", "Fira Code", Consolas, monospace;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #161620;
        --bg2: #1c1c2c;
        --text: #ddd;
        --text2: #999;
        --border: #2e2e48;
        --accent: #60a5fa;
        --code-bg: #1e1e2e;
      }
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); line-height: 1.7; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ─── TOP BAR ─── */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 6px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 13px;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 5px 15px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      cursor: pointer;
      font-family: var(--font);
    }
    .back-btn:hover { border-color: var(--accent); color: var(--accent); }
    .file-path { color: var(--text2); font-family: var(--mono); font-size: 12px; }

    /* ─── CONTENT ─── */
    .content {
      padding: 24px 32px 64px;
      font-size: 14px;
    }

    /* ─── MARKDOWN STYLES ─── */
    .content h1 { font-size: 1.3rem; margin: 28px 0 10px; padding-bottom: 5px; border-bottom: 1px solid var(--border); }
    .content h2 { font-size: 1.15rem; margin: 22px 0 8px; padding-bottom: 3px; border-bottom: 1px solid var(--border); }
    .content h3 { font-size: 1.05rem; margin: 18px 0 6px; }
    .content h4 { font-size: 0.95rem; margin: 14px 0 5px; }
    .content h1:first-child { margin-top: 0; }
    .content p { margin: 8px 0; }
    .content ul, .content ol { margin: 8px 0; padding-left: 24px; }
    .content li { margin: 3px 0; }
    .content blockquote {
      border-left: 3px solid var(--accent);
      padding: 4px 16px;
      margin: 12px 0;
      color: var(--text2);
      background: var(--bg2);
    }
    .content code {
      font-family: var(--mono);
      font-size: 0.88em;
      background: var(--code-bg);
      padding: 2px 5px;
      border-radius: 3px;
    }
    .content pre {
      background: var(--code-bg);
      padding: 12px 16px;
      border-radius: 6px;
      margin: 12px 0;
      font-size: 13.5px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .content pre code {
      background: none;
      padding: 0;
      font-family: inherit;
      font-size: inherit;
    }
    .content table {
      border-collapse: collapse;
      width: 100%;
      margin: 12px 0;
      font-size: 14px;
    }
    .content th, .content td {
      border: 1px solid var(--border);
      padding: 6px 10px;
      text-align: left;
    }
    .content th { background: var(--bg2); font-weight: 600; }
    .content hr { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
    .content img { max-width: 100%; }
    .content strong { font-weight: 600; }

    /* ─── FRONTMATTER ─── */
    .frontmatter {
      opacity: 0.7;
      font-size: 13px;
      font-family: var(--mono);
      line-height: 1.55;
      margin-bottom: 16px;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0;
    }
    .frontmatter summary {
      cursor: pointer;
      padding: 5px 10px;
      color: var(--text2);
      font-size: 12px;
      user-select: none;
    }
    .frontmatter pre {
      margin: 0;
      padding: 6px 12px;
      background: none;
      font-size: 13px;
      line-height: 1.55;
      border-radius: 0;
    }

    .error { text-align: center; padding: 48px 24px; color: var(--text2); }

    @media (max-width: 640px) {
      .content { padding: 16px; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <button class="back-btn" onclick="goBack()">&#8592; Index</button>
    <span class="file-path" id="filepath"></span>
  </div>
  <article class="content" id="content">
    <p style="color:var(--text2)">Loading...</p>
  </article>

  <script>
    const params = new URLSearchParams(location.search);
    const filePath = params.get('file') || '';

    document.getElementById('filepath').textContent = filePath;
    document.title = filePath.split('/').pop() + ' — Reader';

    function goBack() {
      const idx = 'index.html' + (document.referrer.includes('index.html') ? location.search : '');
      location.href = 'index.html';
    }

    async function load() {
      if (!filePath) {
        document.getElementById('content').innerHTML = '<div class="error">No file specified.</div>';
        return;
      }
      try {
        const resp = await fetch('../' + filePath);
        if (!resp.ok) throw new Error(resp.status + ' ' + resp.statusText);
        let text = await resp.text();
        let fmHtml = '';
        const fmMatch = text.match(/^---\n([\s\S]*?)\n---\n?/);
        if (fmMatch) {
          text = text.slice(fmMatch[0].length);
          fmHtml = '<details class="frontmatter"><summary>metadata</summary><pre>' +
            fmMatch[1].replace(/&/g,'&amp;').replace(/</g,'&lt;') + '</pre></details>';
        }
        document.getElementById('content').innerHTML = fmHtml + marked.parse(text);
      } catch (e) {
        document.getElementById('content').innerHTML =
          '<div class="error">Failed to load <b>' + filePath + '</b><br>' + e.message + '</div>';
      }
    }

    load();
  </script>
</body>
</html>
