// === COMPONENTS ===

function Chip({ icon, name, sub, color, onClick, active, t }) {
  return (
    <div onClick={onClick} style={{
      background: active ? color + "22" : t.chip,
      border: `1.5px solid ${active ? color : t.chipB}`,
      borderRadius: 12, padding: "12px 16px", cursor: "pointer",
      transition: "all 0.2s", minWidth: 120,
      transform: active ? "scale(1.03)" : "scale(1)",
    }}>
      <div style={{ fontSize: 22, marginBottom: 4 }}>{icon}</div>
      <div style={{ fontWeight: 700, color, fontSize: 14 }}>{name}</div>
      {sub && <div style={{ fontSize: 11, color: t.muted, marginTop: 2 }}>{sub}</div>}
    </div>
  );
}

function DetailPanel({ item, type, t }) {

    <div style={{ color: t.muted, fontStyle: "italic", padding: 16, textAlign: "center" }}>
      ← Chọn 1 ô để xem chi tiết
    </div>
  );

  const DeepList = ({ items, color }) => (
    <div style={{ marginTop: 8 }}>
      {items.map((line, i) => (
        <div key={i} style={{
          fontSize: 12, color: t.deep, padding: "5px 0",
          borderBottom: i < items.length - 1 ? `1px solid ${t.deepB}` : "none",
          lineHeight: 1.5,
        }}>
          <span style={{ color: color || t.muted, marginRight: 6 }}>•</span>{line}
        </div>
      ))}
    </div>
  );

  if (type === "channel") return (
    <div style={{ padding: 16, maxHeight: 420, overflowY: "auto" }}>
      <div style={{ fontSize: 20, marginBottom: 8 }}>{item.icon} <span style={{ color: item.color, fontWeight: 700 }}>{item.name}</span></div>
      <div style={{ color: t.soft, marginBottom: 6 }}>Hóa chất: <b style={{ color: item.color }}>{item.chemical}</b></div>
      <div style={{ background: t.card, borderRadius: 8, padding: 12, marginBottom: 8, border: `1px solid ${t.cardB}` }}>
        <div style={{ fontWeight: 700, marginBottom: 4 }}>{item.pe}</div>
        <div style={{ color: t.soft }}>{item.desc}</div>
      </div>
      {item.deep && <DeepList items={item.deep} color={item.color} />}
      <div style={{ fontSize: 11, color: t.muted, marginTop: 10, borderTop: `1px solid ${t.cardB}`, paddingTop: 6 }}>Kênh gốc = nguồn PE mạnh nhất. Chặn → MẤT hoàn toàn 1 loại PE.</div>
    </div>
  );

  if (type === "additive") return (
    <div style={{ padding: 16, maxHeight: 420, overflowY: "auto" }}>
      <div style={{ fontSize: 20, marginBottom: 8 }}>{item.icon} <span style={{ color: item.color, fontWeight: 700 }}>{item.name}</span></div>
      <div style={{ color: t.soft, marginBottom: 8 }}>Vai trò: <b>{item.role}</b></div>
      <div style={{ display: "flex", gap: 8, marginBottom: 8 }}>
        <div style={{ flex: 1, background: t.hiB, borderRadius: 8, padding: 10 }}>
          <div style={{ fontSize: 11, color: "#4ade80", marginBottom: 2 }}>▲ Cao</div>
          <div style={{ fontSize: 13 }}>{item.high}</div>
        </div>
        <div style={{ flex: 1, background: t.loB, borderRadius: 8, padding: 10 }}>
          <div style={{ fontSize: 11, color: "#f87171", marginBottom: 2 }}>▼ Thấp</div>
          <div style={{ fontSize: 13 }}>{item.low}</div>
        </div>
      </div>
      {item.note && <div style={{ background: t.noteB, borderRadius: 8, padding: 10, fontSize: 12, color: "#b59f24", borderLeft: "3px solid #fbbf24", marginBottom: 6 }}>{item.note}</div>}
      {item.deep && <DeepList items={item.deep} color={item.color} />}
      <div style={{ fontSize: 11, color: t.muted, marginTop: 10, borderTop: `1px solid ${t.cardB}`, paddingTop: 6 }}>Phụ gia = ĐIỀU CHỈNH kênh gốc. Chặn → kênh gốc vẫn có nhưng biểu hiện KHÁC.</div>
    </div>
  );

  if (type === "param") return (
    <div style={{ padding: 16, maxHeight: 420, overflowY: "auto" }}>
      <div style={{ fontSize: 20, marginBottom: 8 }}>{item.icon} <span style={{ fontWeight: 700 }}>{item.name}</span></div>
      <div style={{ color: t.soft, marginBottom: 8 }}>{item.desc}</div>
      <div style={{ background: t.card, borderRadius: 8, padding: 12, marginBottom: 8, border: `1px solid ${t.cardB}` }}>
        <div style={{ fontSize: 13 }}>{item.detail}</div>
      </div>
      {item.deep && <DeepList items={item.deep} color="#fbbf24" />}
    </div>

  return null;
}

          <div style={{ fontWeight: 700, color: m.color, fontSize: 13 }}>{m.name}</div>
          <div style={{ fontSize: 10, color: t.muted }}>{m.desc}</div>

// === LAYER COMPONENT ===
function Layer({ id, title, icon, color, children, borderColor, t }) {
  return (
    <div style={{
      background: `${color}08`,
      border: `1.5px solid ${(borderColor || color)}22`,
      borderRadius: 16, padding: 20, marginBottom: 12,
    }}>
      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 14 }}>
        <span style={{ fontSize: 22 }}>{icon}</span>
        <span style={{ fontWeight: 800, fontSize: 16, color }}>{title}</span>
        <span style={{ fontSize: 11, color: t.muted, marginLeft: "auto" }}>{id}</span>
      </div>
      {children}
    </div>
  );
}

              Override power: schema mạnh nhất thắng
            </div>
            <div style={{ fontWeight: 700, fontSize: 12, color: "#a78bfa", marginBottom: 6, marginTop: 10 }}>🔭 Predictive-Chunk Config (per domain)</div>
            <div style={{ fontSize: 11, color: t.muted, lineHeight: 1.6 }}>
              Depth (xa ↔ ngắn) × Source (internal ↔ external) × Sync (rời rạc ↔ hệ thống)<br/>
              Deepen ↔ Explore · Cost (đắt/rẻ)
            </div>
          </div>
          <div>
            <div style={{ fontWeight: 700, fontSize: 12, color: "#a78bfa", marginBottom: 6 }}>🧭 4 Pattern (nhãn mô tả)</div>
            <ComplianceGrid t={t} />
          </div>
        </div>
      </Layer>

      {/* TẦNG 0 */}
      <Layer id="Tầng 0" title="PHẦN CỨNG SINH HÓA" icon="🧬" color="#fbbf24" borderColor="#fbbf24" t={t}>
        <div style={{ fontSize: 12, color: t.soft, marginBottom: 12 }}>Gen quy định, ít thay đổi. Quyết định PHẠM VI khả năng.</div>

        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
          {/* Left: chips */}
          <div>
            <div style={{ fontWeight: 700, fontSize: 12, color: "#fbbf24", marginBottom: 8 }}>3 Kênh Gốc — nguồn PE chính</div>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 14 }}>
              {channels.map(c => <Chip key={c.name} {...c} sub={c.pe} active={selected === c} onClick={() => select(c, "channel")} t={t} />)}
            </div>

            <div style={{ fontWeight: 700, fontSize: 12, color: "#fbbf24", marginBottom: 8 }}>5 Phụ Gia — điều chỉnh kênh gốc</div>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 14 }}>
              {additives.map(a => <Chip key={a.name} {...a} sub={a.role} active={selected === a} onClick={() => select(a, "additive")} t={t} />)}
            </div>

            <div style={{ fontWeight: 700, fontSize: 12, color: "#fbbf24", marginBottom: 8 }}>3 Tham Số Nền</div>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
              {params.map(p => <Chip key={p.name} {...p} sub={p.desc} color="#fbbf24" active={selected === p} onClick={() => select(p, "param")} t={t} />)}
            </div>
          </div>

          {/* Right: detail panel + inverted-U */}
          <div>
            <div style={{
              background: t.panel, borderRadius: 12, minHeight: 200,
              border: `1px solid ${t.panelB}`,
            }}>
              <DetailPanel item={selected} type={selType} t={t} />
            </div>
            <InvertedU t={t} />
          </div>
        </div>

        <div style={{ marginTop: 10, background: t.card, borderRadius: 10, padding: 12, border: `1px solid ${t.cardB}` }}>
          <div style={{ fontWeight: 700, fontSize: 12, color: "#fbbf24", marginBottom: 4 }}>🔋 Baseline Drive</div>
          <div style={{ fontSize: 11, color: t.muted }}>
            Não LUÔN chạy (baseline {'>'} 0). PE deficit kéo dài → baseline giảm → apathy. PE surplus → baseline tăng → bồn chồn.
          </div>
        </div>

        <div style={{ marginTop: 8, textAlign: "center", fontSize: 11, color: t.muted, padding: "4px 0" }}>
          <b>Bộ Ba Dự Đoán:</b> Threshold × PE Sensitivity × Kênh gốc = predict hầu hết hành vi
        </div>
      </Layer>

      {/* TẦNG -1 */}
      <Layer id="Tầng -1" title="BỐI CẢNH" icon="🌍" color="#34d399" t={t}>
        <div style={{ fontSize: 12, color: t.soft }}>
          Văn hóa · Gia đình · Kinh tế · Thời đại → Nguyên liệu xây mô hình + calibrate chunk config
        </div>
        <div style={{ fontSize: 11, color: t.muted, marginTop: 6 }}>
          Bối cảnh KHÔNG phải phần cứng — là nguyên liệu THÔ để xây phần mềm (Tầng 1).
        </div>
      </Layer>

      {/* MASTER FORMULA */}
      <div style={{
        background: t.card, borderRadius: 12, padding: 16, marginTop: 8,
        border: `1px solid ${t.cardB}`, textAlign: "center",
      }}>
        <div style={{ fontWeight: 700, fontSize: 13, color: t.heading, marginBottom: 6 }}>Master Formula</div>
        <div style={{ fontSize: 11, color: t.soft, lineHeight: 1.8, fontFamily: "monospace" }}>
          Hành vi = Kênh gốc × Phụ gia × Tham số × Baseline Drive<br/>
          × Prediction (depth × cost × deepen/explore) per domain<br/>
          × Chunk Config (Depth × Source × Sync) per domain<br/>
          × Schema (override) × Đường mòn × PFC × Bối cảnh
        </div>
      </div>

      <div style={{ textAlign: "center", fontSize: 10, color: t.footer, marginTop: 16 }}>
        Human Predictive Drive Framework v5.0 — Visual Reference
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
